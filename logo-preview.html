<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Logo Preview — האתר של ליאב</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    background: linear-gradient(160deg, #f5f0e6 0%, #ede7d8 50%, #e4dac8 100%);
    font-family: 'Crimson Text', serif;
  }

  h2 {
    color: #1a0a00;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.5;
    margin: 0;
  }

  .variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* Light background variant */
  .on-light { background: #faf6ed; padding: 32px 48px; border-radius: 4px; box-shadow: 0 4px 24px rgba(26,10,0,0.12); }

  /* Dark background variant */
  .on-dark { background: #1a0a00; padding: 32px 48px; border-radius: 4px; box-shadow: 0 4px 24px rgba(26,10,0,0.3); }

  /* Medium background */
  .on-aged { background: #f0e6cc; padding: 32px 48px; border-radius: 4px; box-shadow: 0 4px 24px rgba(26,10,0,0.1); }

  img { max-width: 100%; height: auto; display: block; }

  /* Inline SVG version with loaded fonts */
  .logo-inline {
    width: 520px;
    max-width: 90vw;
  }
</style>
</head>
<body>

<div class="variant">
  <h2>On Paper Background</h2>
  <div class="on-light">
    <img src="logo.svg" width="520" height="160" alt="Logo">
  </div>
</div>

<div class="variant">
  <h2>On Aged Paper</h2>
  <div class="on-aged">
    <img src="logo.svg" width="520" height="160" alt="Logo">
  </div>
</div>

<div class="variant">
  <h2>On Dark / Ink</h2>
  <div class="on-dark">
    <!-- Inverted version: white text on dark -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160" class="logo-inline">
      <defs>
        <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#e2b840"/>
          <stop offset="50%" style="stop-color:#c9a227"/>
          <stop offset="100%" style="stop-color:#a07c10"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Dark background -->
      <rect width="520" height="160" fill="#1a0a00"/>

      <!-- Gold border frame -->
      <rect x="6" y="6" width="508" height="148" rx="2" fill="none" stroke="#c9a227" stroke-width="2"/>
      <rect x="10" y="10" width="500" height="140" rx="1" fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.5"/>

      <!-- Rules -->
      <line x1="30" y1="45" x2="490" y2="45" stroke="#c9a227" stroke-width="1" opacity="0.6"/>
      <line x1="30" y1="115" x2="490" y2="115" stroke="#c9a227" stroke-width="1" opacity="0.6"/>

      <!-- Ornaments -->
      <g transform="translate(36,80)">
        <polygon points="0,-12 2,-4 8,-8 4,-1 12,0 4,1 8,8 2,4 0,12 -2,4 -8,8 -4,1 -12,0 -4,-1 -8,-8 -2,-4" fill="url(#goldGrad2)"/>
        <circle cx="0" cy="0" r="3.5" fill="#1a0a00"/>
        <circle cx="0" cy="0" r="2" fill="#c9a227"/>
      </g>
      <g transform="translate(484,80)">
        <polygon points="0,-12 2,-4 8,-8 4,-1 12,0 4,1 8,8 2,4 0,12 -2,4 -8,8 -4,1 -12,0 -4,-1 -8,-8 -2,-4" fill="url(#goldGrad2)"/>
        <circle cx="0" cy="0" r="3.5" fill="#1a0a00"/>
        <circle cx="0" cy="0" r="2" fill="#c9a227"/>
      </g>
      <circle cx="22" cy="22" r="2.5" fill="#c9a227" opacity="0.7"/>
      <circle cx="498" cy="22" r="2.5" fill="#c9a227" opacity="0.7"/>
      <circle cx="22" cy="138" r="2.5" fill="#c9a227" opacity="0.7"/>
      <circle cx="498" cy="138" r="2.5" fill="#c9a227" opacity="0.7"/>

      <!-- Main title -->
      <text x="260" y="95"
            font-family="'UnifrakturMaguntia', 'Crimson Text', Georgia, serif"
            font-size="52"
            font-weight="700"
            text-anchor="middle"
            fill="#faf6ed"
            letter-spacing="2"
            filter="url(#glow)">האתר של ליאב</text>

      <!-- Subtitle -->
      <text x="260" y="112"
            font-family="'Crimson Text', Georgia, serif"
            font-size="13"
            font-style="italic"
            text-anchor="middle"
            fill="#c9a227"
            letter-spacing="3">עיתוני הסרטים המצוירים</text>

      <!-- Top decoration -->
      <text x="260" y="35"
            font-family="'Crimson Text', Georgia, serif"
            font-size="9"
            text-anchor="middle"
            fill="#c9a227"
            letter-spacing="4"
            opacity="0.6">✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦  ✦</text>

      <!-- Bottom tagline -->
      <text x="260" y="131"
            font-family="'Crimson Text', Georgia, serif"
            font-size="8.5"
            text-anchor="middle"
            fill="#c9a227"
            letter-spacing="5"
            opacity="0.8">★  THE ANIMATED PRESS  ★</text>
    </svg>
  </div>
</div>

<div class="variant">
  <h2>Small Size (Header)</h2>
  <div class="on-light">
    <img src="logo.svg" width="320" height="98" alt="Logo small">
  </div>
</div>

</body>
</html>
